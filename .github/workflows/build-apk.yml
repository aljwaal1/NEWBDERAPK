name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - 'apk/**'
      - 'DOWNLOAD_APK.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --project-name badr_gpt .

      - name: Clean default tests
        run: rm -rf test

      - name: Get packages
        run: flutter pub get

      - name: Configure Android package and app name
        run: |
          sed -i "s/applicationId = \"[^\"]*\"/applicationId = \"com.explapp.badrgpt\"/" android/app/build.gradle.kts
          sed -i "s/minSdk = flutter.minSdkVersion/minSdk = 23/" android/app/build.gradle.kts
          cat > android/app/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="عالم بدر"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          MANIFEST

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK to repo
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/badr.apk
          cat > DOWNLOAD_APK.md <<'MD'
          # تحميل APK

          آخر نسخة مبنية من التطبيق:

          https://github.com/aljwaal1/bdergpt/raw/main/apk/badr.apk
          MD

      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/badr.apk DOWNLOAD_APK.md
          git commit -m "Build APK" || echo "No changes to commit"
          git push
