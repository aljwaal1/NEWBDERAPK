name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Prepare Android project
        run: |
          flutter create --platforms=android --org com.explapp .
          rm -rf test

      - name: Patch Android
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for p in [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]:
              if not p.exists():
                  continue
              s = p.read_text()
              s = s.replace('applicationId "com.explapp.badr_world_native"', 'applicationId "com.explapp.badrworld"')
              s = s.replace('applicationId = "com.explapp.badr_world_native"', 'applicationId = "com.explapp.badrworld"')
              s = s.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 24')
              s = s.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
              s = s.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
              s = s.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 35')
              p.write_text(s)
          manifest = Path('android/app/src/main/AndroidManifest.xml')
          if manifest.exists():
              s = manifest.read_text()
              s = s.replace('android:label="badr_world_native"', 'android:label="عالم بدر"')
              manifest.write_text(s)
          PY

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/badr.apk
          cat > DOWNLOAD_APK.md <<'EOF'
          # تحميل APK

          رابط مباشر بعد نجاح GitHub Actions:

          https://github.com/aljwaal1/NEWBDERAPK/raw/main/apk/badr.apk

          أو من داخل المستودع:

          apk/badr.apk
          EOF

      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/badr.apk DOWNLOAD_APK.md
          git commit -m "Update APK" || echo "No changes"
          git push
