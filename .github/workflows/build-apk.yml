name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Prepare Android
        run: |
          flutter create --platforms=android --org com.explapp .
          rm -rf test
          python3 - <<'PY'
          from pathlib import Path
          for p in [Path('android/app/build.gradle'), Path('android/app/build.gradle.kts')]:
              if p.exists():
                  s=p.read_text()
                  s=s.replace('applicationId "com.explapp.badr_world_native"', 'applicationId "com.explapp.badrworld"')
                  s=s.replace('applicationId = "com.explapp.badr_world_native"', 'applicationId = "com.explapp.badrworld"')
                  s=s.replace('minSdkVersion flutter.minSdkVersion', 'minSdkVersion 24')
                  s=s.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
                  s=s.replace('targetSdkVersion flutter.targetSdkVersion', 'targetSdkVersion 35')
                  s=s.replace('targetSdk = flutter.targetSdkVersion', 'targetSdk = 35')
                  p.write_text(s)
          m=Path('android/app/src/main/AndroidManifest.xml')
          if m.exists():
              s=m.read_text()
              s=s.replace('android:label="badr_world_native"', 'android:label="عالم بدر"')
              if 'android.permission.RECORD_AUDIO' not in s:
                  s=s.replace('<manifest xmlns:android="http://schemas.android.com/apk/res/android">','<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>')
              m.write_text(s)
          PY
      - run: flutter pub get
      - run: flutter analyze --no-fatal-infos --no-fatal-warnings
      - run: flutter build apk --release --no-tree-shake-icons
      - name: Copy APK
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/badr.apk
          echo "https://github.com/aljwaal1/NEWBDERAPK/raw/main/apk/badr.apk" > DOWNLOAD_APK.md
      - name: Commit APK
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add apk/badr.apk DOWNLOAD_APK.md
          git commit -m "Update APK" || echo "No changes"
          git push
